<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DotCome CRM - כניסה</title>
<style>
* { box-sizing: border-box; }
body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
       font-family:"Segoe UI", Arial, sans-serif;
       background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 50%,#60a5fa 100%); }
.card { background:#fff; padding:36px 40px; border-radius:14px; width:340px;
        box-shadow:0 20px 60px rgba(0,0,0,.25); }
h1 { margin:0 0 4px; font-size:24px; color:#1e293b; }
.sub { margin:0 0 24px; color:#64748b; font-size:13px; }
label { display:block; font-size:12px; color:#475569; margin-bottom:6px; font-weight:600; }
input[type=password], input[type=text] { width:100%; padding:12px 14px; border:1px solid #cbd5e1; border-radius:8px;
                      font-size:15px; font-family:inherit; outline:none; transition:.15s; }
input[type=password]:focus, input[type=text]:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
.field + .field { margin-top:14px; }
button { width:100%; margin-top:18px; padding:12px; border:none; border-radius:8px;
         background:#3b82f6; color:#fff; font-size:15px; font-weight:600; cursor:pointer;
         transition:.15s; }
button:hover { background:#2563eb; }
.error { margin-top:14px; color:#dc2626; font-size:13px; text-align:center; }
.footer { margin-top:22px; text-align:center; color:#94a3b8; font-size:11px; }
</style>
</head>
<body>
<form class="card" method="post">
  <h1>DotCome CRM</h1>
  <p class="sub">הכניסו שם משתמש וסיסמה כדי להמשיך</p>
  <div class="field">
    <label for="username">שם משתמש</label>
    <input type="text" name="username" id="username" autofocus autocapitalize="none" autocomplete="username">
  </div>
  <div class="field">
    <label for="password">סיסמה</label>
    <input type="password" name="password" id="password" autocomplete="current-password">
  </div>
  <button type="submit">כניסה</button>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <div class="footer">&copy; DotCome</div>
</form>
</body>
</html>
